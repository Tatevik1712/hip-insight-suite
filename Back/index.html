<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICOM/PNG to PNG Конвертер с аннотациями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .upload-section {
            margin-bottom: 25px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            background: #fafafa;
        }

        .upload-section h3 {
            color: #444;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 1em;
        }

        .file-input-wrapper {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .image-container {
            margin-top: 30px;
            border-radius: 15px;
            overflow: hidden;
            background: #f8f9ff;
            display: none;
            text-align: center;
        }

        .image-container.show {
            display: block;
        }

        .image-title {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        #imageDisplay {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .points-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .file-info {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            color: #2e7d32;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .points-info {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            color: #e65100;
            display: none;
        }

        .points-info.show {
            display: block;
        }

        .point-item {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.9em;
        }

        .source-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 DICOM/PNG Конвертер с аннотациями</h1>
        <p class="subtitle">Загрузите DICOM-файл или готовое PNG-изображение для получения аннотированного результата</p>
        
        <!-- DICOM Upload Section -->
        <div class="upload-section">
            <h3>📄 DICOM-файл</h3>
            <div class="upload-area" id="dicomUploadArea">
                <div class="upload-icon">🩻</div>
                <div class="upload-text">
                    Перетащите DICOM файл (.dcm) сюда<br>
                    или нажмите для выбора
                </div>
                <input type="file" id="dicomInput" class="file-input-wrapper" accept=".dcm,.dicom">
            </div>
            <div class="file-info" id="dicomFileInfo"></div>
        </div>

        <!-- PNG Upload Section -->
        <div class="upload-section">
            <h3>🖼️ PNG-изображение</h3>
            <div class="upload-area" id="pngUploadArea">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">
                    Перетащите PNG файл сюда<br>
                    или нажмите для выбора
                </div>
                <input type="file" id="pngInput" class="file-input-wrapper" accept="image/png">
            </div>
            <div class="file-info" id="pngFileInfo"></div>
        </div>

        <button class="btn" id="convertBtn" disabled>
            🔄 Обработать изображение
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Обработка...</div>
        </div>

        <div class="error" id="error"></div>

        <div class="image-container" id="imageContainer">
            <div class="image-title">
                🖼️ Результат <span class="source-badge" id="sourceBadge"></span>
            </div>
            <div class="image-wrapper">
                <img id="imageDisplay" src="" alt="Processed Image">
                <canvas id="pointsCanvas" class="points-canvas"></canvas>
            </div>
        </div>

        <div class="points-info" id="pointsInfo"></div>
    </div>

    <script>
        // DOM Elements
        const dicomUploadArea = document.getElementById('dicomUploadArea');
        const pngUploadArea = document.getElementById('pngUploadArea');
        const dicomInput = document.getElementById('dicomInput');
        const pngInput = document.getElementById('pngInput');
        const convertBtn = document.getElementById('convertBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const imageContainer = document.getElementById('imageContainer');
        const imageDisplay = document.getElementById('imageDisplay');
        const pointsCanvas = document.getElementById('pointsCanvas');
        const dicomFileInfo = document.getElementById('dicomFileInfo');
        const pngFileInfo = document.getElementById('pngFileInfo');
        const pointsInfo = document.getElementById('pointsInfo');
        const sourceBadge = document.getElementById('sourceBadge');

        let selectedFile = null;
        let fileType = null; // 'dicom' or 'png'
        let currentPoints = null;

        // Setup upload areas
        function setupUploadArea(uploadArea, fileInput, type) {
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelection(e.target.files[0], type);
                }
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    handleFileSelection(e.dataTransfer.files[0], type);
                }
            });
        }

        // Initialize both upload areas
        setupUploadArea(dicomUploadArea, dicomInput, 'dicom');
        setupUploadArea(pngUploadArea, pngInput, 'png');

        // Handle file selection
        function handleFileSelection(file, type) {
            // Reset other selection
            if (type === 'dicom') {
                pngInput.value = '';
                pngFileInfo.classList.remove('show');
            } else {
                dicomInput.value = '';
                dicomFileInfo.classList.remove('show');
            }

            selectedFile = file;
            fileType = type;
            convertBtn.disabled = false;
            
            const fileInfo = type === 'dicom' ? dicomFileInfo : pngFileInfo;
            const icon = type === 'dicom' ? '🩻' : '🖼️';
            fileInfo.textContent = `${icon} Выбран файл: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
            fileInfo.classList.add('show');
            
            // Reset previous results
            imageContainer.classList.remove('show');
            pointsInfo.classList.remove('show');
            error.classList.remove('show');
            
            // Clear canvas
            const ctx = pointsCanvas.getContext('2d');
            ctx.clearRect(0, 0, pointsCanvas.width, pointsCanvas.height);
        }

        // Draw point with highlighted neighborhood
        function drawPointWithNeighbors(ctx, x, y, scaleX, scaleY, pointNumber) {
            const radius = 5;
            const centerX = x * scaleX;
            const centerY = y * scaleY;
            const scaledRadius = radius * Math.min(scaleX, scaleY);
            
            // Draw semi-transparent area around point
            ctx.beginPath();
            ctx.arc(centerX, centerY, scaledRadius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.fill();
            
            // Draw bright center point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 3, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.9)';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Draw pixel grid for clarity (5x5)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 0.5;
            
            const pixelWidth = scaleX;
            const pixelHeight = scaleY;
            
            for (let i = -radius; i <= radius; i++) {
                for (let j = -radius; j <= radius; j++) {
                    const pixelX = (x + i) * scaleX;
                    const pixelY = (y + j) * scaleY;
                    ctx.strokeRect(
                        pixelX - pixelWidth/2, 
                        pixelY - pixelHeight/2, 
                        pixelWidth, 
                        pixelHeight
                    );
                }
            }
            
            // Draw point number
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            ctx.fillText(pointNumber, centerX + 10, centerY - 10);
            ctx.shadowBlur = 0;
        }

        // Parse points from prediction response
        function parsePoints(predict) {
            if (!predict) return null;
            const parsedPoints = {};
            
            for (const [key, point] of Object.entries(predict)) {
                if (point && (point.x !== undefined || point.y !== undefined)) {
                    parsedPoints[key] = {
                        x: parseFloat(point.x),
                        y: parseFloat(point.y)
                    };
                    
                    if (isNaN(parsedPoints[key].x) || isNaN(parsedPoints[key].y)) {
                        console.warn(`Invalid coordinates for ${key}:`, point);
                        delete parsedPoints[key];
                    }
                }
            }
            return parsedPoints;
        }

        // Draw points on canvas
        function drawPointsOnCanvas() {
            if (!currentPoints || !imageDisplay.complete || imageDisplay.naturalWidth === 0) {
                return;
            }

            pointsCanvas.width = imageDisplay.width;
            pointsCanvas.height = imageDisplay.height;
            const ctx = pointsCanvas.getContext('2d');
            ctx.clearRect(0, 0, pointsCanvas.width, pointsCanvas.height);
            
            const scaleX = imageDisplay.width / imageDisplay.naturalWidth;
            const scaleY = imageDisplay.height / imageDisplay.naturalHeight;

            let pointIndex = 1;
            for (const [key, point] of Object.entries(currentPoints)) {
                if (point && typeof point.x === 'number' && typeof point.y === 'number') {
                    drawPointWithNeighbors(ctx, point.x, point.y, scaleX, scaleY, pointIndex.toString());
                    pointIndex++;
                }
            }
        }

        // Update points info display
        function updatePointsInfo(predict) {
            if (!predict) return;

            let pointsHtml = '<div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">';
            let pointIndex = 1;
            
            for (const [key, point] of Object.entries(predict)) {
                if (point && typeof point.x === 'number' && typeof point.y === 'number') {
                    pointsHtml += `
                        <div class="point-item">
                            Точка ${pointIndex}: (${point.x.toFixed(1)}, ${point.y.toFixed(1)})
                        </div>
                    `;
                    pointIndex++;
                }
            }
            pointsHtml += '</div>';
            
            pointsInfo.innerHTML = `
                <strong>📍 Отмеченные точки (закрашены пиксели и область 5×5 вокруг):</strong><br>
                ${pointsHtml}
            `;
            pointsInfo.classList.add('show');
        }

        // Process image
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.classList.add('show');
            error.classList.remove('show');
            imageContainer.classList.remove('show');
            pointsInfo.classList.remove('show');
            convertBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('source_type', fileType); // Send file type to backend

                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Ошибка обработки изображения');
                }

                const data = await response.json();
                
                console.log('=== RECEIVED DATA ===');
                console.log('Pixel size X:', data.pixel_size_x);
                console.log('Pixel size Y:', data.pixel_size_y);
                console.log('Predictions (raw):', data.predict);
                
                const parsedPredict = parsePoints(data.predict);
                console.log('Predictions (parsed):', parsedPredict);
                
                currentPoints = parsedPredict;
                
                // Display result image
                imageDisplay.src = `data:image/png;base64,${data.image}`;
                imageContainer.classList.add('show');
                
                // Update source badge
                sourceBadge.textContent = fileType === 'dicom' ? 'из DICOM' : 'из PNG';
                
                updatePointsInfo(currentPoints);

                // Draw points after image loads
                imageDisplay.onload = function() {
                    drawPointsOnCanvas();
                };

                // Handle cached images
                if (imageDisplay.complete && imageDisplay.naturalWidth !== 0) {
                    drawPointsOnCanvas();
                }

            } catch (err) {
                error.textContent = `❌ Ошибка: ${err.message}`;
                error.classList.add('show');
                console.error('Processing error:', err);
            } finally {
                loading.classList.remove('show');
                convertBtn.disabled = false;
            }
        });

        // Redraw points on window resize
        window.addEventListener('resize', () => {
            if (imageContainer.classList.contains('show') && currentPoints) {
                drawPointsOnCanvas();
            }
        });

        // Allow canvas pointer events for potential future interactivity
        pointsCanvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
